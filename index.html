<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>燕京理工学院 · 同楼帮 | 闲置交换站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f7fb; font-family: system-ui, -apple-system; padding-bottom: 70px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 8px 0 12px; border-top: 1px solid #eee; z-index: 100; }
        .nav-item { text-align: center; font-size: 12px; cursor: pointer; color: #8c9aa8; flex: 1; }
        .nav-item.active { color: #2c7da0; font-weight: 500; }
        .page { display: none; padding: 16px; }
        .page.active { display: block; }
        .search-bar { background: white; border-radius: 30px; padding: 8px 16px; margin-bottom: 16px; display: flex; gap: 12px; }
        .search-bar input { flex: 1; border: none; outline: none; }
        .filter-chip { background: #eef2f6; padding: 6px 12px; border-radius: 20px; font-size: 13px; display: inline-block; cursor: pointer; margin-right: 8px; margin-bottom: 8px; }
        .filter-chip.active { background: #2c7da0; color: white; }
        .toggle-switch { display: inline-flex; align-items: center; gap: 8px; background: #eef2f6; padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; }
        .item-card, .wanted-card { background: white; border-radius: 16px; padding: 12px; margin-bottom: 12px; display: flex; gap: 12px; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.04); }
        .item-img { width: 70px; height: 70px; background: #eef2f6; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; overflow: hidden; }
        .item-img img { width: 100%; height: 100%; object-fit: cover; }
        .item-info { flex: 1; }
        .item-title { font-weight: 600; }
        .item-desc { font-size: 12px; color: #666; margin: 4px 0; display: flex; flex-wrap: wrap; gap: 6px; }
        .item-tag { background: #f0f3f8; padding: 2px 8px; border-radius: 12px; font-size: 11px; }
        .item-contact { font-size: 11px; color: #2c7da0; margin-top: 4px; }
        .delete-btn { color: #e55353; cursor: pointer; font-size: 12px; }
        .form-group { margin-bottom: 16px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; }
        .image-preview { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        .image-preview img { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; }
        .btn { background: #2c7da0; color: white; border: none; padding: 12px; border-radius: 30px; font-size: 16px; width: 100%; cursor: pointer; margin-top: 8px; }
        .safety-tip { font-size: 11px; color: gray; text-align: center; margin-top: 12px; }
        .empty-state { text-align: center; padding: 40px; color: gray; }
        .campus-badge { background: #eef2f6; border-radius: 20px; padding: 6px 12px; font-size: 12px; display: inline-block; margin-bottom: 12px; }
        .detail-container { background: white; border-radius: 20px; padding: 20px; }
        .detail-images { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 16px; }
        .detail-images img { width: 100px; height: 100px; object-fit: cover; border-radius: 12px; }
        .location-selector { background: white; border-radius: 16px; padding: 12px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
        .copy-contact { color: #2c7da0; cursor: pointer; text-decoration: underline; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="bottom-nav">
    <div class="nav-item" data-page="home">🏠 找闲置</div>
    <div class="nav-item" data-page="wanted">📢 求购</div>
    <div class="nav-item" data-page="publish">📤 发闲置</div>
    <div class="nav-item" data-page="publishWanted">✏️ 发求购</div>
    <div class="nav-item" data-page="profile">👤 我的</div>
</div>

<div id="homePage" class="page active">
    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
        <div class="campus-badge">📍 燕京理工学院 · 闲置站</div>
        <div class="toggle-switch"><span>🏠 只看同地点</span><input type="checkbox" id="sameLocationOnly"></div>
    </div>
    <div class="search-bar"><input type="text" id="searchInput" placeholder="搜索物品..."><span>🔍</span></div>
    <div style="margin-bottom: 12px;">
        <span class="filter-chip" data-cat="all">全部</span>
        <span class="filter-chip" data-cat="教材">📚 教材</span>
        <span class="filter-chip" data-cat="数码">💻 数码</span>
        <span class="filter-chip" data-cat="宿舍">🛏️ 宿舍</span>
        <span class="filter-chip" data-cat="美妆">💄 美妆</span>
        <span class="filter-chip" data-cat="其他">🎁 其他</span>
    </div>
    <div id="itemsList"></div>
    <div class="safety-tip">⚠️ 交易当面核对，谨防诈骗</div>
</div>

<div id="wantedPage" class="page">
    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
        <div class="campus-badge">📢 校园求购</div>
        <div class="toggle-switch"><span>🏠 只看同地点</span><input type="checkbox" id="wantedSameLocationOnly"></div>
    </div>
    <div class="search-bar"><input type="text" id="wantedSearchInput" placeholder="搜索求购..."><span>🔍</span></div>
    <div id="wantedList"></div>
</div>

<div id="publishPage" class="page">
    <form id="publishForm">
        <div class="form-group"><label>物品名称 *</label><input type="text" id="itemName" required></div>
        <div class="form-group"><label>分类 *</label><select id="itemCat"><option value="教材">📚 教材</option><option value="数码">💻 数码</option><option value="宿舍">🛏️ 宿舍</option><option value="美妆">💄 美妆</option><option value="其他">🎁 其他</option></select></div>
        <div class="form-group"><label>成色</label><select id="itemCondition"><option>九成新</option><option>八成新</option><option>七成新</option></select></div>
        <div class="form-group"><label>描述</label><textarea id="itemDesc" rows="2"></textarea></div>
        <div class="form-group"><label>图片（最多3张）</label><input type="file" id="itemImages" accept="image/*" multiple><div class="image-preview" id="imagePreview"></div></div>
        <div class="form-group"><label>地点 *</label><select id="campusLocation"><option value="宿舍楼">宿舍楼</option><option value="M楼">M楼</option><option value="D楼">D楼</option><option value="实训楼">实训楼</option><option value="综合楼">综合楼</option><option value="艺术楼">艺术楼</option><option value="商业街">商业街</option><option value="篮球场">篮球场</option><option value="足球场">足球场</option></select></div>
        <div class="form-group"><label>联系方式</label><input type="text" id="contact" placeholder="微信号/手机号"></div>
        <div class="safety-tip">🔒 联系方式不会直接显示</div>
        <button type="submit" class="btn">✨ 发布闲置</button>
    </form>
</div>

<div id="publishWantedPage" class="page">
    <form id="publishWantedForm">
        <div class="form-group"><label>求购标题 *</label><input type="text" id="wantedTitle" required></div>
        <div class="form-group"><label>分类</label><select id="wantedCat"><option value="教材">📚 教材</option><option value="数码">💻 数码</option><option value="宿舍">🛏️ 宿舍</option><option value="美妆">💄 美妆</option><option value="其他">🎁 其他</option></select></div>
        <div class="form-group"><label>详细描述</label><textarea id="wantedDesc" rows="2"></textarea></div>
        <div class="form-group"><label>期望地点 *</label><select id="wantedLocation"><option value="宿舍楼">宿舍楼</option><option value="M楼">M楼</option><option value="D楼">D楼</option><option value="实训楼">实训楼</option><option value="综合楼">综合楼</option><option value="艺术楼">艺术楼</option><option value="商业街">商业街</option><option value="篮球场">篮球场</option><option value="足球场">足球场</option></select></div>
        <div class="form-group"><label>联系方式</label><input type="text" id="wantedContact" placeholder="微信号/手机号"></div>
        <button type="submit" class="btn">📢 发布求购</button>
    </form>
</div>

<div id="profilePage" class="page">
    <div class="location-selector">
        <span>📍 我的位置：</span>
        <select id="myLocationSelect">
            <option value="宿舍楼">宿舍楼</option><option value="M楼">M楼</option><option value="D楼">D楼</option>
            <option value="实训楼">实训楼</option><option value="综合楼">综合楼</option><option value="艺术楼">艺术楼</option>
            <option value="商业街">商业街</option><option value="篮球场">篮球场</option><option value="足球场">足球场</option>
        </select>
    </div>
    <h3>📦 我发布的闲置</h3>
    <div id="myItemsList"></div>
    <h3 style="margin-top: 20px;">📢 我发布的求购</h3>
    <div id="myWantedList"></div>
    <div class="safety-tip">⭐ 信用分: <span id="myCredit">100</span></div>
</div>

<div id="detailPage" class="page"></div>

<script>
    // Supabase 配置
    const SUPABASE_URL = "https://yklqmbsjqxfosmygjmtk.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_a5DI2BTOoGEDu90y-mY9ww_KuCAAo2D";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let currentUser = { id: "", name: "", location: "宿舍楼", credit: 100 };
    let items = [];
    let wantedList = [];
    
    async function initUser() {
        let userId = localStorage.getItem("userId");
        if (userId) {
            const { data, error } = await supabase.from('users').select('*').eq('id', userId).single();
            if (data && !error) {
                currentUser = { id: data.id, name: data.name, location: data.location || "宿舍楼", credit: data.credit || 100 };
                document.getElementById("myCredit").innerText = currentUser.credit;
                document.getElementById("myLocationSelect").value = currentUser.location;
                return;
            }
        }
        const newUserId = crypto.randomUUID();
        const newUserName = "同学" + Math.floor(Math.random() * 1000);
        await supabase.from('users').insert([{ id: newUserId, name: newUserName, location: "宿舍楼", credit: 100 }]);
        currentUser = { id: newUserId, name: newUserName, location: "宿舍楼", credit: 100 };
        localStorage.setItem("userId", newUserId);
    }
    
    function compressImage(file, maxSizeKB = 200) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width, height = img.height;
                    const maxDim = 800;
                    if (width > maxDim || height > maxDim) {
                        if (width > height) { height = (height / width) * maxDim; width = maxDim; }
                        else { width = (width / height) * maxDim; height = maxDim; }
                    }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    let quality = 0.8;
                    let dataUrl = canvas.toDataURL('image/jpeg', quality);
                    while (dataUrl.length > maxSizeKB * 1024 && quality > 0.2) {
                        quality -= 0.1;
                        dataUrl = canvas.toDataURL('image/jpeg', quality);
                    }
                    resolve(dataUrl);
                };
            };
        });
    }
    
    async function loadItems() {
        const { data, error } = await supabase.from('items').select('*').order('created_at', { ascending: false });
        return error ? [] : data || [];
    }
    
    async function loadWanted() {
        const { data, error } = await supabase.from('wanted').select('*').order('created_at', { ascending: false });
        return error ? [] : data || [];
    }
    
    let currentCat = "all", searchKeyword = "", sameLocationOnly = false;
    async function renderHome() {
        items = await loadItems();
        let filtered = items.filter(item => {
            if (currentCat !== "all" && item.cat !== currentCat) return false;
            if (searchKeyword && !item.name.includes(searchKeyword) && !(item.description && item.description.includes(searchKeyword))) return false;
            if (sameLocationOnly && item.location !== currentUser.location) return false;
            return true;
        });
        const container = document.getElementById("itemsList");
        if (filtered.length === 0) { container.innerHTML = '<div class="empty-state">✨ 没有找到闲置，去发布一个吧</div>'; return; }
        let html = "";
        filtered.forEach(item => {
            html += `<div class="item-card" onclick="showItemDetail('${item.id}')">
                        <div class="item-img">${item.images && item.images[0] ? `<img src="${item.images[0]}" />` : '📦'}</div>
                        <div class="item-info">
                            <div class="item-title">${escapeHtml(item.name)}</div>
                            <div class="item-desc"><span class="item-tag">${item.cat}</span><span class="item-tag">${item.condition}</span>${item.description ? `<span class="item-tag">${escapeHtml(item.description)}</span>` : ''}</div>
                            <div class="item-contact">📍 ${item.location} | 👤 ${item.owner_name}</div>
                        </div>
                    </div>`;
        });
        container.innerHTML = html;
    }
    
    window.showItemDetail = async function(id) {
        const item = items.find(i => i.id === id);
        if (!item) return;
        let contactHtml = item.contact && item.contact !== '未填' ? `<span class="copy-contact" onclick="copyContact('${escapeHtml(item.contact)}')">📋 复制联系方式</span>` : '<span style="color:gray;">未留联系方式</span>';
        let imagesHtml = item.images && item.images.length ? `<div class="detail-images">${item.images.map(img => `<img src="${img}" />`).join('')}</div>` : '';
        let detailHtml = `
            <div class="detail-container">
                ${imagesHtml}
                <div class="detail-info">
                    <p><strong>${escapeHtml(item.name)}</strong></p>
                    <p>分类：${item.cat} | 成色：${item.condition}</p>
                    <p>地点：${item.location}</p>
                    <p>描述：${escapeHtml(item.description) || '无'}</p>
                    <p>发布者：${item.owner_name}</p>
                    <p>联系方式：${contactHtml}</p>
                    ${item.owner_id !== currentUser.id ? `<button class="btn" onclick="confirmEvaluate('${item.id}', '${item.owner_id}')">👍 确认完成交易并评价（信用+5）</button>` : ''}
                    <button class="btn" onclick="switchPage('home')">返回</button>
                </div>
            </div>
        `;
        document.getElementById("detailPage").innerHTML = detailHtml;
        switchPage("detail");
    };
    
    window.copyContact = function(contact) {
        navigator.clipboard.writeText(contact).then(() => alert(`✅ 已复制：${contact}\n请去微信添加对方`));
    };
    
    window.confirmEvaluate = async function(itemId, sellerId) {
        if (confirm("确认已完成交易？\n评价后双方信用分各+5")) {
            const { data: seller } = await supabase.from('users').select('credit').eq('id', sellerId).single();
            const { data: buyer } = await supabase.from('users').select('credit').eq('id', currentUser.id).single();
            if (seller) await supabase.from('users').update({ credit: (seller.credit || 80) + 5 }).eq('id', sellerId);
            if (buyer) {
                await supabase.from('users').update({ credit: (buyer.credit || 100) + 5 }).eq('id', currentUser.id);
                currentUser.credit = (buyer.credit || 100) + 5;
                document.getElementById("myCredit").innerText = currentUser.credit;
            }
            alert("评价成功！信用分+5");
            await renderHome();
            switchPage("home");
        }
    };
    
    let wantedSearch = "", wantedSameLocation = false;
    async function renderWanted() {
        wantedList = await loadWanted();
        let filtered = wantedList.filter(w => {
            if (wantedSearch && !w.title.includes(wantedSearch) && !(w.description && w.description.includes(wantedSearch))) return false;
            if (wantedSameLocation && w.location !== currentUser.location) return false;
            return true;
        });
        const container = document.getElementById("wantedList");
        if (filtered.length === 0) { container.innerHTML = '<div class="empty-state">📢 暂无求购</div>'; return; }
        let html = "";
        filtered.forEach(w => {
            html += `<div class="wanted-card" onclick="showWantedDetail('${w.id}')">
                        <div class="item-img">📢</div>
                        <div class="item-info">
                            <div class="item-title">${escapeHtml(w.title)}</div>
                            <div class="item-desc"><span class="item-tag">${w.cat}</span>${w.description ? `<span class="item-tag">${escapeHtml(w.description)}</span>` : ''}</div>
                            <div class="item-contact">📍 ${w.location} | 👤 ${w.owner_name}</div>
                        </div>
                    </div>`;
        });
        container.innerHTML = html;
    }
    
    window.showWantedDetail = async function(id) {
        const wanted = wantedList.find(w => w.id === id);
        if (!wanted) return;
        let contactHtml = wanted.contact && wanted.contact !== '未填' ? `<span class="copy-contact" onclick="copyContact('${escapeHtml(wanted.contact)}')">📋 复制联系方式</span>` : '<span style="color:gray;">未留联系方式</span>';
        let detailHtml = `
            <div class="detail-container">
                <div class="detail-info">
                    <p><strong>${escapeHtml(wanted.title)}</strong></p>
                    <p>分类：${wanted.cat}</p>
                    <p>期望地点：${wanted.location}</p>
                    <p>描述：${escapeHtml(wanted.description) || '无'}</p>
                    <p>发布者：${wanted.owner_name}</p>
                    <p>联系方式：${contactHtml}</p>
                    <button class="btn" onclick="switchPage('wanted')">返回</button>
                </div>
            </div>
        `;
        document.getElementById("detailPage").innerHTML = detailHtml;
        switchPage("detail");
    };
    
    document.getElementById("publishForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const name = document.getElementById("itemName").value.trim();
        if (!name) return alert("请输入物品名称");
        const files = document.getElementById("itemImages").files;
        let images = [];
        for (let i = 0; i < Math.min(files.length, 3); i++) {
            images.push(await compressImage(files[i], 200));
        }
        await supabase.from('items').insert([{
            id: crypto.randomUUID(),
            name: name,
            cat: document.getElementById("itemCat").value,
            condition: document.getElementById("itemCondition").value,
            description: document.getElementById("itemDesc").value,
            location: document.getElementById("campusLocation").value,
            contact: document.getElementById("contact").value.trim() || "未填",
            owner_id: currentUser.id,
            owner_name: currentUser.name,
            images: images
        }]);
        alert("发布成功！所有人可见");
        document.getElementById("publishForm").reset();
        document.getElementById("imagePreview").innerHTML = "";
        await renderHome();
        switchPage("home");
    });
    
    document.getElementById("itemImages").addEventListener("change", function() {
        const preview = document.getElementById("imagePreview");
        preview.innerHTML = "";
        Array.from(this.files).slice(0, 3).forEach(file => {
            const reader = new FileReader();
            reader.onload = e => { const img = document.createElement("img"); img.src = e.target.result; preview.appendChild(img); };
            reader.readAsDataURL(file);
        });
    });
    
    document.getElementById("publishWantedForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const title = document.getElementById("wantedTitle").value.trim();
        if (!title) return alert("请输入标题");
        await supabase.from('wanted').insert([{
            id: crypto.randomUUID(),
            title: title,
            cat: document.getElementById("wantedCat").value,
            description: document.getElementById("wantedDesc").value,
            location: document.getElementById("wantedLocation").value,
            contact: document.getElementById("wantedContact").value.trim() || "未填",
            owner_id: currentUser.id,
            owner_name: currentUser.name
        }]);
        alert("求购发布成功！");
        document.getElementById("publishWantedForm").reset();
        await renderWanted();
        switchPage("wanted");
    });
    
    async function renderProfile() {
        const myItems = items.filter(i => i.owner_id === currentUser.id);
        const myWanted = wantedList.filter(w => w.owner_id === currentUser.id);
        let itemsHtml = myItems.length ? "" : '<div class="empty-state">暂无闲置</div>';
        myItems.forEach(i => {
            itemsHtml += `<div class="item-card"><div class="item-img">${i.images && i.images[0] ? `<img src="${i.images[0]}" />` : '📦'}</div><div class="item-info"><div class="item-title">${escapeHtml(i.name)}</div><div class="item-desc">${i.location} | ${i.condition}</div><div class="item-contact"><span class="delete-btn" onclick="deleteMyItem('${i.id}', 'item')">删除</span></div></div></div>`;
        });
        let wantedHtml = myWanted.length ? "" : '<div class="empty-state">暂无求购</div>';
        myWanted.forEach(w => {
            wantedHtml += `<div class="wanted-card"><div class="item-info"><div class="item-title">${escapeHtml(w.title)}</div><div class="item-desc">${w.location}</div><div class="item-contact"><span class="delete-btn" onclick="deleteMyItem('${w.id}', 'wanted')">删除</span></div></div></div>`;
        });
        document.getElementById("myItemsList").innerHTML = itemsHtml;
        document.getElementById("myWantedList").innerHTML = wantedHtml;
    }
    
    window.deleteMyItem = async (id, type) => {
        if (confirm("确定删除？")) {
            if (type === 'item') await supabase.from('items').delete().eq('id', id);
            else await supabase.from('wanted').delete().eq('id', id);
            await renderHome();
            await renderWanted();
            await renderProfile();
        }
    };
    
    document.getElementById("myLocationSelect").addEventListener("change", async (e) => {
        currentUser.location = e.target.value;
        await supabase.from('users').update({ location: currentUser.location }).eq('id', currentUser.id);
        if (sameLocationOnly) renderHome();
        if (wantedSameLocation) renderWanted();
        alert("当前位置已更新");
    });
    
    function switchPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId + "Page").classList.add('active');
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        document.querySelector(`.nav-item[data-page="${pageId}"]`).classList.add('active');
        if (pageId === "home") renderHome();
        if (pageId === "wanted") renderWanted();
        if (pageId === "profile") renderProfile();
    }
    
    function bindFilters() {
        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentCat = chip.getAttribute('data-cat');
                renderHome();
            });
        });
        document.getElementById("searchInput").addEventListener("input", e => { searchKeyword = e.target.value; renderHome(); });
        document.getElementById("sameLocationOnly").addEventListener("change", e => { sameLocationOnly = e.target.checked; renderHome(); });
        document.getElementById("wantedSearchInput").addEventListener("input", e => { wantedSearch = e.target.value; renderWanted(); });
        document.getElementById("wantedSameLocationOnly").addEventListener("change", e => { wantedSameLocation = e.target.checked; renderWanted(); });
    }
    
    function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    
    async function init() {
        await initUser();
        await renderHome();
        await renderWanted();
        await renderProfile();
        bindFilters();
        document.querySelectorAll('.nav-item').forEach(nav => nav.addEventListener('click', () => switchPage(nav.getAttribute('data-page'))));
        document.querySelector('.filter-chip[data-cat="all"]').classList.add('active');
    }
    init();
</script>
</body>
</html>
